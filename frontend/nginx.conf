# Serves the built SPA and reverse-proxies the API + WebSocket to the backend
# container (service name `backend` on the compose network). With this in place
# the frontend is built with relative VITE_API_URL=/api/v1 and VITE_WS_URL=/ws,
# so the bundle has no hard-coded host and works behind any domain.
upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # nginx liveness — used by the compose/ALB healthcheck.
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # REST API + Django admin + OpenAPI schema.
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://backend;
    }

    # Django Channels WebSockets (notifications + interview).
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — every other path serves index.html for client routing.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
